server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Security headers
  add_header X-Content-Type-Options    "nosniff"           always;
  add_header X-Frame-Options           "DENY"              always;
  add_header X-XSS-Protection          "1; mode=block"     always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

  # Content-Security-Policy
  # - default-src 'self'           → apenas recursos da própria origem
  # - script-src 'self'            → sem inline scripts nem eval (Angular compila estático)
  # - style-src 'self' 'unsafe-inline' → Angular Material injeta estilos inline
  # - font-src 'self' fonts.gstatic.com → Material Icons (CDN)
  # - img-src 'self' data:         → avatars base64 e ícones SVG inline
  # - connect-src 'self' <api>     → requisições ao backend; ajustar em prod
  # - object-src 'none'            → bloqueia Flash/plugins legados
  # - frame-ancestors 'none'       → equivalente a X-Frame-Options DENY via CSP
  add_header Content-Security-Policy
    "default-src 'self'; \
     script-src 'self'; \
     style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
     font-src 'self' https://fonts.gstatic.com; \
     img-src 'self' data:; \
     connect-src 'self' http://localhost:8080; \
     object-src 'none'; \
     frame-ancestors 'none';"
    always;
}
