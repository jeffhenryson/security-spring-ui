<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>SecuritySpring</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <app-root>
      <!-- Removido automaticamente quando o AppComponent renderiza (pós APP_INITIALIZER) -->
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #030712;
          gap: 16px;
          z-index: 9999;
        "
      >
        <svg
          width="40"
          height="40"
          viewBox="0 0 40 40"
          fill="none"
          style="animation: ss-spin 0.9s linear infinite"
        >
          <circle cx="20" cy="20" r="16" stroke="#1e293b" stroke-width="4" />
          <path
            d="M20 4a16 16 0 0 1 16 16"
            stroke="#22d3ee"
            stroke-width="4"
            stroke-linecap="round"
          />
        </svg>
        <span style="color: #475569; font-family: Roboto, sans-serif; font-size: 13px">
          SecuritySpring
        </span>
      </div>
      <style>
        @keyframes ss-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </app-root>
  </body>
</html>
